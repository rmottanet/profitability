<!doctype html>
<html lang="en">
  <head>
  	<title>Profitability</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
	<link href='https://fonts.googleapis.com/css?family=Roboto:400,100,300,700' rel='stylesheet' type='text/css'>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="css/style.css">
	</head>
	<body>
	<section class="ftco-section">
		<div class="container">
			<div class="row no-gutters">
				<div class="col-md-7">
					<div class="contact-wrap w-100 p-md-5 p-4">
						<h3 class="mb-4">CDB Profitability</h3>
						
						<div>
							<p id="tributes">&nbsp;</p>
							<p id="profits">&nbsp;</p>						
						</div>
						
						<form id="calcForm" name="calcForm" class="calcForm">
							<div class="row">
								<div class="col-md-6">
									<div class="form-group">
										<label class="label" for="fRate">Rate</label>
										<input type="number" class="form-control" name="fRate" id="fRate" placeholder="Taxa">
									</div>
								</div>
								<div class="col-md-6"> 
									<div class="form-group">
										<label class="label" for="fTerm">Term</label>
										<input type="number" class="form-control" name="fTerm" id="fTerm" placeholder="Prazo">
									</div>
								</div>
								<div class="col-md-12">
									<div class="form-group">
										<input type="radio" id="modal" name="modal" value="PRE" />
									    <label for="modal">PRE</label>
									
									    <input type="radio" id="modal" name="modal" value="POS" checked="checked" />
									    <label for="modal">POS</label>
									</div>
								</div>
								<div class="col-md-12">
									<div class="form-group">
										<input type="button" value="Calcule" class="btn btn-primary" onclick="calc()">
									</div>						
								</div>
							</div>
						</form>
						
					</div>
				</div>
				
				<div class="col-md-5 d-flex align-items-stretch">
					<div class="info-wrap w-100 p-5 img" style="background-image: url(images/img.jpg);"></div>
				</div>

			</div>
		</div>
	</section>

	<script src="js/jquery.min.js"></script>
	<script src="js/popper.js"></script>
	<script src="js/bootstrap.min.js"></script>
	<script src="js/jquery.validate.min.js"></script>
	<script src="js/main.js"></script>
	<script src="js/calc.js"></script>

	</body>
</html>
